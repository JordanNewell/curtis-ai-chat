name: Lint

# Runs the scorecard-matching ESLint ruleset (eslint-plugin-obsidianmd +
# type-checked @typescript-eslint) on every push to master and every PR.
# `npm run lint` reproduces the Obsidian plugin directory's automated review —
# if this passes, the scorecard should pass too. Fails the build on warnings.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npx tsc -noEmit -skipLibCheck

      - name: Lint (scorecard ruleset)
        run: npm run lint
